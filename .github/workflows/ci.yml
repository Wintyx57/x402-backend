name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '20.19.0'
          cache: npm
      - run: npm ci
      # Progressively tighten: 124 warnings remain (mostly unused vars in test fixtures)
      - run: npx eslint . --max-warnings 130

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '20.19.0'
          cache: npm
      - run: npm ci
      - name: Run unit tests (no network required)
        run: npm test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '20.19.0'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  e2e-tests:
    name: E2E Tests (production)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, security]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '20.19.0'
          cache: npm
      - run: npm ci
      - name: Wake up Render server
        # Wait up to 90s for cold start before running tests
        run: |
          for i in 1 2 3; do
            curl -sf --max-time 30 https://x402-api.onrender.com/health && break
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done || echo "Server did not respond — tests may fail"
      - name: Run E2E tests against production
        run: node --test tests/e2e.test.js
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        # E2E tests hit production: rate limits and cold starts may cause flakiness.
        # Keep continue-on-error: false to catch real regressions.
        # If flakiness is a recurring problem, consider a staging environment.
        continue-on-error: false
