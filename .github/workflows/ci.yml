name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
      - run: npm ci
      - name: Run unit tests (no network required)
        run: node --test tests/payment.test.js tests/chains.test.js tests/monitor.test.js tests/services-logic.test.js tests/validation.test.js tests/logger.test.js tests/register-validation.test.js tests/budget.test.js tests/activity.test.js tests/middleware.test.js tests/new-apis.test.js tests/telegram-bot.test.js tests/payouts.test.js tests/reviews.test.js tests/split.test.js

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  e2e-tests:
    name: E2E Tests (production)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
      - run: npm ci
      - name: Wake up Render server
        # Wait up to 90s for cold start before running tests
        run: |
          for i in 1 2 3; do
            curl -sf --max-time 30 https://x402-api.onrender.com/health && break
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done || echo "Server did not respond — tests may fail"
      - name: Run E2E tests against production
        run: node --test tests/e2e.test.js
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        # E2E tests hit production: rate limits and cold starts may cause flakiness.
        # Keep continue-on-error: false to catch real regressions.
        # If flakiness is a recurring problem, consider a staging environment.
        continue-on-error: false
